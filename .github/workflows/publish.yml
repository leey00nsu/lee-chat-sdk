name: Publish SDK

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run publish as a dry run
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run release gate
        run: pnpm release:check

      - name: Upload CDN bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: lee-chat-sdk-cdn-bundle
          path: |
            packages/sdk/dist/lee-chat.global.js
            packages/sdk/dist/lee-chat.global.manifest.json
          if-no-files-found: error

      - name: Publish dry run
        if: ${{ inputs.dry_run }}
        run: pnpm --filter lee-chat-sdk publish --dry-run --access public --no-git-checks

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm --filter lee-chat-sdk publish --access public --provenance --no-git-checks
