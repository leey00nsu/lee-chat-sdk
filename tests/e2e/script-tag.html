<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lee Chat SDK Script Tag E2E</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      .lee-chat-root {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Host page</h1>
    </main>
    <script src="/lee-chat.global.js"></script>
    <script>
      window.__LEE_CHAT_INSTANCE__ = window.LeeChat.initLeeChat({
        appId: 'script-tag-e2e',
        endpoint: '/api/chat',
        visitor: {
          id: 'visitor-script-tag-e2e',
        },
        initialOpen: true,
        initialMessage: 'Welcome from script tag.',
        isolation: 'shadowDom',
        persistence: 'memory',
        uploadAttachment: async (file) => {
          return {
            kind: 'file',
            url: `/uploads/${file.name}`,
            name: file.name,
            mediaType: file.type,
            size: file.size,
          }
        },
        texts: {
          title: 'Support',
          subtitle: 'Script tag test',
          triggerLabel: 'Chat',
          placeholder: 'Write a message',
          send: 'Send',
          sending: 'Sending...',
          assistantLoading: 'Thinking...',
        },
      })
    </script>
  </body>
</html>
